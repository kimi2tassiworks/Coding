<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Würfelgenerator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #fff;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(192, 192, 192, 0.5);
            background: linear-gradient(90deg, #c0c0c0, #e8e8e8, #c0c0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .dice-input {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        label {
            font-size: 1.2rem;
            color: #c0c0c0;
        }
        
        input[type="number"] {
            width: 100px;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 2px solid #c0c0c0;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #e8e8e8;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.3);
        }
        
        .buttons {
            display: flex;
            gap: 15px;
        }
        
        button {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .roll-btn {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 50%, #a8a8a8 100%);
            color: #1a1a2e;
            box-shadow: 0 5px 20px rgba(192, 192, 192, 0.4);
        }
        
        .roll-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(192, 192, 192, 0.6);
        }
        
        .roll-btn:active {
            transform: translateY(0);
        }
        
        .restart-btn {
            background: transparent;
            color: #c0c0c0;
            border: 2px solid #c0c0c0;
        }
        
        .restart-btn:hover {
            background: rgba(192, 192, 192, 0.1);
            border-color: #e8e8e8;
            color: #e8e8e8;
        }
        
        .dice-container {
            perspective: 1000px;
            margin-bottom: 40px;
        }
        
        .dice {
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            color: #1a1a2e;
            background: linear-gradient(145deg, #e8e8e8 0%, #c0c0c0 25%, #d4d4d4 50%, #a8a8a8 75%, #c0c0c0 100%);
            border-radius: 20px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 2px 10px rgba(255, 255, 255, 0.5),
                inset 0 -2px 10px rgba(0, 0, 0, 0.2);
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.3),
                -1px -1px 2px rgba(255, 255, 255, 0.3);
            animation: none;
            position: relative;
            overflow: hidden;
        }
        
        .dice::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 60%
            );
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .dice.rolling {
            animation: roll 0.5s ease-in-out;
        }
        
        @keyframes roll {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            25% { transform: rotateX(90deg) rotateY(90deg); }
            50% { transform: rotateX(180deg) rotateY(180deg); }
            75% { transform: rotateX(270deg) rotateY(270deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        
        .stats-container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(192, 192, 192, 0.2);
            border-radius: 15px;
            padding: 25px;
            flex: 1;
            min-width: 300px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .panel h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #c0c0c0;
            border-bottom: 1px solid rgba(192, 192, 192, 0.3);
            padding-bottom: 10px;
        }
        
        .history-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-list li {
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(192, 192, 192, 0.1);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-list li:nth-child(odd) {
            background: rgba(192, 192, 192, 0.15);
        }
        
        .history-list .roll-num {
            font-weight: bold;
            color: #e8e8e8;
        }
        
        .history-list .roll-time {
            font-size: 0.85rem;
            color: #888;
        }
        
        .frequency-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }
        
        .frequency-num {
            width: 40px;
            font-weight: bold;
            color: #c0c0c0;
        }
        
        .frequency-bar-container {
            flex: 1;
            height: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            margin: 0 10px;
        }
        
        .frequency-bar {
            height: 100%;
            background: linear-gradient(90deg, #c0c0c0, #e8e8e8);
            border-radius: 12px;
            transition: width 0.3s ease;
            min-width: 0;
        }
        
        .frequency-count {
            width: 50px;
            text-align: right;
            color: #888;
            font-size: 0.9rem;
        }
        
        .empty-message {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-style: italic;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(192, 192, 192, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(192, 192, 192, 0.5);
        }
    </style>
</head>
<body>
    <h1>🎲 Würfelgenerator</h1>
    
    <div class="controls">
        <div class="dice-input">
            <label for="diceCount">Seitenanzahl:</label>
            <input type="number" id="diceCount" min="1" max="100" value="6">
        </div>
        <div class="buttons">
            <button class="roll-btn" onclick="rollDice()">Würfeln</button>
            <button class="restart-btn" onclick="restart()">Restart</button>
        </div>
    </div>
    
    <div class="dice-container">
        <div class="dice" id="dice">
            <span id="diceValue">?</span>
        </div>
    </div>
    
    <div class="stats-container">
        <div class="panel">
            <h2>📜 Letzte Würfe</h2>
            <ul class="history-list" id="historyList">
                <li class="empty-message">Noch keine Würfe</li>
            </ul>
        </div>
        
        <div class="panel">
            <h2>📊 Häufigkeit</h2>
            <div id="frequencyChart">
                <div class="empty-message">Noch keine Daten</div>
            </div>
        </div>
    </div>
    
    <script>
        let history = [];
        let frequency = {};
        
        function rollDice() {
            const diceCount = parseInt(document.getElementById('diceCount').value) || 6;
            const max = Math.min(Math.max(diceCount, 1), 100);
            
            const dice = document.getElementById('dice');
            const diceValue = document.getElementById('diceValue');
            
            // Animation
            dice.classList.add('rolling');
            
            // Generate random number
            const result = Math.floor(Math.random() * max) + 1;
            
            setTimeout(() => {
                dice.classList.remove('rolling');
                diceValue.textContent = result;
                
                // Add to history
                const now = new Date();
                const timeStr = now.toLocaleTimeString('de-DE');
                history.unshift({ value: result, time: timeStr });
                
                // Update frequency
                frequency[result] = (frequency[result] || 0) + 1;
                
                // Update display
                updateHistory();
                updateFrequency();
            }, 500);
        }
        
        function updateHistory() {
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<li class="empty-message">Noch keine Würfe</li>';
                return;
            }
            
            list.innerHTML = history.slice(0, 50).map((roll, index) => `
                <li>
                    <span class="roll-num">${roll.value}</span>
                    <span class="roll-time">${roll.time}</span>
                </li>
            `).join('');
        }
        
        function updateFrequency() {
            const chart = document.getElementById('frequencyChart');
            
            if (Object.keys(frequency).length === 0) {
                chart.innerHTML = '<div class="empty-message">Noch keine Daten</div>';
                return;
            }
            
            const maxCount = Math.max(...Object.values(frequency));
            const sortedNumbers = Object.keys(frequency)
                .map(Number)
                .sort((a, b) => a - b);
            
            chart.innerHTML = sortedNumbers.map(num => {
                const count = frequency[num];
                const percentage = (count / maxCount) * 100;
                return `
                    <div class="frequency-item">
                        <span class="frequency-num">${num}</span>
                        <div class="frequency-bar-container">
                            <div class="frequency-bar" style="width: ${percentage}%"></div>
                        </div>
                        <span class="frequency-count">${count}x</span>
                    </div>
                `;
            }).join('');
        }
        
        function restart() {
            history = [];
            frequency = {};
            document.getElementById('diceValue').textContent = '?';
            updateHistory();
            updateFrequency();
        }
        
        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                rollDice();
            }
        });
    </script>
</body>
</html>
